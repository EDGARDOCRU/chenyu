<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>My Browser Homepage</title>
    <script src="https://kit.fontawesome.com/b988687505.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://kit.fontawesome.com/b988687505.css" crossorigin="anonymous">
    <style>
        /*实现页面随分辨率自适应*/
        body {
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #ccc;
            display: flex;
            justify-content: space-around;
            padding: 10px;
        }

        nav a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
        }

        @media (max-width: 800px) {
            nav {
                flex-direction: column;
                align-items: center;
            }

            nav a {
                margin-bottom: 10px;
            }
        }

        /* 样式表 */
        #search-form {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: white;
        }

        #search-form input {
            width: 30pc;
        }

        #search-form input[type="text"] {
            font-size: 1pc;
            border: none;
        }

        .input-group {
            width: auto;
            display: flex;
        }

        #links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
            margin: 30px auto;
        }

        input[type="text"] {
            border: none;
            outline: none;
            position: relative;
        }

        input[type="text"]::before {
            display: block;
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
        }

        #links a {
            display: block;
            width: 150px;
            height: 60px;
            /* 将按钮高度增加以使文字居中 */
            margin: 10px;
            padding: 10px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            text-decoration: none;
            color: black;
            font-size: 20px;
            /* 增加字体大小以适应按钮高度 */
            line-height: 60px;
            /* 将行高设置为按钮高度 */
            transition: all 0.3s ease;
        }

        #links a:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        /*搜索表单*/
        #search-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .radio-group {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .radio-group label {
            margin: 0 10px;
        }

        .search-bar {
            display: flex;
            align-items: center;
        }

        .search-bar input[type="text"] {
            margin-right: 10px;
        }

        /*点击选项取消圆圈显示*/
        .radio-group input[type="radio"] {
            display: none;
        }

        /*搜索引擎选项按钮样式*/
        .hvr-bubble-bottom {
            cursor: pointer;
            display: inline-block;
            vertical-align: middle;
            position: relative
        }

        .hvr-bubble-bottom:before {
            pointer-events: none;
            position: absolute;
            content: '';
            border-style: solid;
            left: calc(50% - 8px);
            bottom: 0;
            border-width: 7px 7px 0;
            border-color: #383b3f transparent transparent;
            display: none;
            /* 默认隐藏 */
        }

        /* 选中时的样式 */
        input:checked+label.hvr-bubble-bottom:before {
            display: block;
            transform: translateY(10px);
        }

        /*搜索图标、放大镜*/
        .bn632-hover {
            width: 70px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            height: 40px;
            text-align: center;
            border: none;
            background-size: 300% 100%;
            border-radius: 5px;
            -o-transition: all .4s ease-in-out;
            -webkit-transition: all .4s ease-in-out;
            transition: all .4s ease-in-out;
        }

        .bn632-hover:hover {
            background-position: 100% 0;
            -o-transition: all .4s ease-in-out;
            -webkit-transition: all .4s ease-in-out;
            transition: all .4s ease-in-out;
        }

        .bn632-hover:focus {
            outline: none;
        }

        .bn632-hover.bn25 {
            background-image: linear-gradient(to right,
                    #29323c,
                    #485563,
                    #2b5876,
                    #4e4376);
        }
    </style>
</head>

<body>
    <!-- 搜索表单 -->
    <form id="search-form" target="_blank">
        <!-- 搜索引擎选项 -->
        <div class="radio-group">
            <input type="radio" name="search-engine" value="https://www.google.com/search" onchange="changeAction()" id="google">
            <label for="google" class="hvr-bubble-bottom">Google</label>
            <input type="radio" name="search-engine" value="https://www.baidu.com/s" onchange="changeAction()" id="baidu">
            <label for="baidu" class="hvr-bubble-bottom">Baidu</label>
            <input type="radio" name="search-engine" value="https://www.bing.com/search" onchange="changeAction()" id="bing">
            <label for="bing" class="hvr-bubble-bottom">Bing</label>
        </div>
        <!-- 搜索输入框和提交按钮 -->
        <div class="input-group">
            <input type="text" name="q" autocomplete="off" class="form-control" placeholder="输入搜索内容" />
            <button type="submit" class="bn632-hover bn25"><i class="fas fa-search"></i></button>
        </div>
    </form>
    <!-- 链接列表 -->
    <div id="links">
        <a href="https://translate.google.com.hk/?hl=zh-CN" target="_blank">谷歌翻译</a>
        <a href="https://graph.baidu.com/pcpage/index?tpl_from=pc" target="_blank">百度识图</a>
        <a href=" https://www.github.com" target="_blank">GitHub</a>
        <a href="https://www.bilibili.com/" target="_blank">bilibili</a>
        <a href="https://cloud.hecom.cn/login" target="_blank">红圈CRM°</a>
        <a href="http://gdkjie.com:8888/login.aspx" target="_blank">科捷检测</a>
        <a href="https://gzsm.org.cn/js/a/login" target="_blank">建设管理</a>
        <a href="https://chat.openai.com/chat/" target="_blank">ChatGPT</a>
    </div>
    <script>
        //***实现搜索引擎切换***
        // 当搜索引擎选项变化时，动态更新表单的 action 和查询参数
        window.onload = function () {
            var baiduOption = document.getElementById("baidu");
            baiduOption.checked = true;
            changeAction();
        }
        function changeAction() {
            var radios = document.getElementsByName('search-engine');
            var form = document.getElementById("search-form");
            for (var i = 0; i < radios.length; i++) {
                if (radios[i].checked) {
                    form.action = radios[i].value;
                    // 当选择百度搜索时，更改查询参数名和编码方式
                    if (radios[i].value === "https://www.baidu.com/s") {
                        form.querySelector('input[name="q"]').name = "wd";
                        form.querySelector('input[name="ie"]').value = "utf-8";
                    } else {
                        form.querySelector('input[name="wd"]').name = "q";
                        form.querySelector('input[name="ie"]').value = "";
                    }
                    break;
                }
            }
        }
        // 获取表单元素
        var form = document.getElementById("search-form");
        var searchInput = form.querySelector('input[name="q"]');
        var searchRadios = form.querySelectorAll('input[name="search-engine"]');

        // 监听表单提交事件
        form.addEventListener("submit", function (event) {
            // 如果搜索内容为空或搜索引擎选项未选中，则阻止表单提交
            if (!searchInput.value || !checkRadioSelected(searchRadios)) {
                event.preventDefault();
            }
        });

        // 辅助函数：检查单选框是否有选中项
        function checkRadioSelected(radios) {
            for (var i = 0; i < radios.length; i++) {
                if (radios[i].checked) {
                    return true;
                }
            }
            return false;
        }
    </script>
</body>
