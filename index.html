<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>My Browser Homepage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
        integrity="sha512-guooysgG1f2QDyv95dUN+dQnRJzsoHnWZMvzgTDq3P7nrm8jjcW1sntJzCqADVRqJtX9+YebSvZxgQ2mJlBGMw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /*实现页面随分辨率自适应*/
        body {
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #ccc;
            display: flex;
            justify-content: space-around;
            padding: 10px;
        }

        nav a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
        }

        @media (max-width: 800px) {
            nav {
                flex-direction: column;
                align-items: center;
            }

            nav a {
                margin-bottom: 10px;
            }
        }

        /* 样式表 */
        #search-form {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
        }

        #search-form input[type="text"] {
            flex: 1;
            padding: 10px;
            font-size: 18px;
            width: 500px;
            border: none;
            border-radius: 5px;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
        }

        #links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
            margin: 30px auto;
        }

        input[type="text"] {
            border: none;
            outline: none;
        }

        #links a {
            display: block;
            width: 150px;
            height: 60px;
            /* 将按钮高度增加以使文字居中 */
            margin: 10px;
            padding: 10px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            text-decoration: none;
            color: black;
            font-size: 20px;
            /* 增加字体大小以适应按钮高度 */
            line-height: 60px;
            /* 将行高设置为按钮高度 */
            transition: all 0.3s ease;
        }

        #links a:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }

        /*搜索表单*/
        #search-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .radio-group {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .radio-group label {
            margin: 0 10px;
        }

        .search-bar {
            display: flex;
            align-items: center;
        }

        .search-bar input[type="text"] {
            margin-right: 10px;
        }

        /*点击选项取消圆圈显示*/
        .radio-group input[type="radio"] {
            display: none;
        }

        .radio-group label:before {
            content: "";
            margin-right: 5px;
        }

        .radio-group input[type="radio"]:checked+label:before {
            content: "";
        }

        .radio-group input[type="radio"]:checked+label {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <!-- 搜索表单 -->
    <form id="search-form" action="https://www.google.com/search" method="GET" target="_blank">
        <div class="radio-group">
            <input type="radio" name="search-engine" value="https://www.google.com/search" onchange="changeAction()"
                id="google">
            <label for="google">Google</label>
            <input type="radio" name="search-engine" value="https://www.baidu.com/s" onchange="changeAction()"
                id="baidu">
            <label for="baidu">baidu</label>
            <input type="radio" name="search-engine" value="https://www.bing.com/search" onchange="changeAction()"
                id="bing">
            <label for="bing">bing</label>
        </div>
        <div class="input-group">
            <input type="text" name="q" autocomplete="off" class="form-control" placeholder="输入搜索内容" />
            <button type="submit" class="input-group-text"><i class="fas fa-search"></i></button>
        </div>
    </form>
    <!-- 链接列表 -->
    <div id="links">
        <a href="https://translate.google.com.hk/?hl=zh-CN" target="_blank" onclick="buttonClick(this); sortButtons();"
            data-count="0" data-name="random-name-1">谷歌翻译</a>
        <a href="https://graph.baidu.com/pcpage/index?tpl_from=pc" target="_blank"
            onclick="buttonClick(this); sortButtons();" data-count="0" data-name="random-name-2">百度识图</a>
        <a href=" https://www.github.com" target="_blank" onclick="buttonClick(this); sortButtons();" data-count="0"
            data-name="random-name-3">GitHub</a>
        <a href="https://www.bilibili.com/" target="_blank" onclick="buttonClick(this); sortButtons();" data-count="0"
            data-name="random-name-4">bilibili</a>
        <a href="https://cloud.hecom.cn/login" target="_blank" onclick="buttonClick(this); sortButtons();"
            data-count="0" data-name="random-name-5">红圈CRM°</a>
        <a href="http://gdkjie.com:8888/login.aspx" target="_blank" onclick="buttonClick(this); sortButtons();"
            data-count="0" data-name="random-name-6">科捷检测</a>
        <a href="https://gzsm.org.cn/js/a/login" target="_blank" onclick="buttonClick(this); sortButtons();"
            data-count="0" data-name="random-name-7">建设管理</a>
        <a href="https://chat.openai.com/chat/" target="_blank" onclick="buttonClick(this); sortButtons();"
            data-count="0" data-name="random-name-8">ChatGPT</a>
    </div>
    <script>
        //***实现按钮以点击次数排列***
        function buttonClick(button) {
            var count = parseInt(button.dataset.count);
            count++;
            button.dataset.count = count;
            if (!button.dataset.originalText) {
                button.dataset.originalText = button.textContent;
            }
            button.textContent = button.dataset.originalText;
        }

        function sortButtons() {
            // 获取所有按钮并转换为数组
            var buttons = Array.from(document.querySelectorAll('#links a'));

            // 按照点击次数从大到小排序
            buttons.sort(function (a, b) {
                return parseInt(b.dataset.count) - parseInt(a.dataset.count);
            });

            // 将排好序的按钮重新添加到页面中
            var container = document.querySelector('#links');
            container.innerHTML = '';
            buttons.forEach(function (button) {
                container.appendChild(button);
            });
        }

        //***实现搜索引擎切换***
        function changeAction() {
            var radios = document.getElementsByName('search-engine');
            var form = document.getElementById("search-form");
            for (var i = 0; i < radios.length; i++) {
                if (radios[i].checked) {
                    form.action = radios[i].value;
                    if (radios[i].value === "https://www.baidu.com/s") {
                        form.querySelector('input[name="q"]').name = "wd";
                        form.querySelector('input[name="ie"]').value = "utf-8";
                    } else {
                        form.querySelector('input[name="wd"]').name = "q";
                        form.querySelector('input[name="ie"]').value = "";
                    }
                    break;
                }
            }
        }
    </script>
</body>
