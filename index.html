<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>My Browser Homepage</title>
    <script src="https://kit.fontawesome.com/b988687505.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="1.css">
    <script src="2.js"></script>
</head>

<body>
    <!-- 搜索表单 -->
    <form id="search-form" target="_blank">
        <!-- 搜索引擎选项 -->
        <div class="radio-group">
            <input type="radio" name="search-engine" value="https://www.google.com/search" onchange="changeAction()" id="google">
            <label for="google" class="hvr-bubble-bottom">Google</label>
            <input type="radio" name="search-engine" value="https://www.baidu.com/s" onchange="changeAction()" id="baidu">
            <label for="baidu" class="hvr-bubble-bottom">Baidu</label>
            <input type="radio" name="search-engine" value="https://www.bing.com/search" onchange="changeAction()" id="bing">
            <label for="bing" class="hvr-bubble-bottom">Bing</label>
        </div>
        <!-- 搜索输入框和提交按钮 -->
        <div class="input-group">
            <input type="text" name="q" autocomplete="off" class="form-control" placeholder="输入搜索内容" />
            <button type="submit" class="bn632-hover bn25"><i class="fas fa-search"></i></button>
        </div>
    </form>
    <!-- 链接列表 -->
    <div id="links">
        <a href="https://translate.google.com.hk/?hl=zh-CN" class="button reverse dark" target="_blank">谷歌翻译</a>
        <a href="https://graph.baidu.com/pcpage/index?tpl_from=pc" class="button reverse dark" target="_blank">百度识图</a>
        <a href=" https://www.github.com" class="button reverse dark" target="_blank">GitHub</a>
        <a href="https://www.bilibili.com/" class="button reverse dark" target="_blank">bilibili</a>
        <a href="https://cloud.hecom.cn/login" class="button reverse dark" target="_blank">红圈CRM°</a>
        <a href="http://gdkjie.com:8888/login.aspx" class="button reverse dark" target="_blank">科捷检测</a>
        <a href="https://gzsm.org.cn/js/a/login" class="button reverse dark" target="_blank">建设管理</a>
        <a href="https://chat.openai.com/chat/" class="button reverse dark" target="_blank">ChatGPT</a>
    </div>
    <script src="1.js"></script>
</body>
